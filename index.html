<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>도시계획 프로젝트 관리</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap');



:root {
  --bg: #f4f2ee;
  --white: #ffffff;
  --ink: #1c1c1c;
  --ink2: #4a4a4a;
  --ink3: #888;
  --border: #ddd9d0;
  --border2: #ece9e2;
  --green: #1a5c3a;
  --green-light: #e6f2eb;
  --green-mid: #2e7d52;
  --blue: #1a3a6e;
  --blue-light: #e6edf8;
  --amber: #b45309;
  --amber-light: #fef3cd;
  --red: #b91c1c;
  --red-light: #fee2e2;
  --gray-light: #f0ede6;
  --shadow: 0 1px 4px rgba(0,0,0,0.07);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  font-size: 14px;
}

/* ── TOPBAR ── */
.topbar {
  background: var(--green);
  color: white;
  padding: 0 28px;
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 200;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-mark {
  width: 30px; height: 30px;
  background: rgba(255,255,255,0.15);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
}

.logo-text {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.3px;
}

.logo-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.55);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.5px;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.btn-add {
  background: white;
  color: var(--green);
  border: none;
  border-radius: 7px;
  padding: 7px 16px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: opacity 0.15s;
}
.btn-add:hover { opacity: 0.88; }

/* ── STATS BAR ── */
.stats-bar {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex;
  gap: 28px;
  align-items: center;
  flex-wrap: wrap;
}

.stat-item {
  display: flex;
  align-items: center;
  gap: 10px;
}

.stat-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.stat-label { font-size: 12px; color: var(--ink3); }
.stat-val { font-size: 18px; font-weight: 800; font-family: 'DM Mono', monospace; margin-left: 4px; }

.stat-divider { width: 1px; height: 28px; background: var(--border2); }

/* ── TOOLBAR ── */
.toolbar {
  padding: 14px 28px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 180px;
  max-width: 320px;
}

.search-wrap input {
  width: 100%;
  padding: 8px 12px 8px 34px;
  border: 1px solid var(--border);
  border-radius: 7px;
  font-size: 13px;
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--white);
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--green); }

.search-icon {
  position: absolute;
  left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--ink3);
  font-size: 14px;
}

.filter-btn {
  padding: 8px 14px;
  border: 1px solid var(--border);
  border-radius: 7px;
  background: var(--white);
  font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  color: var(--ink2);
  transition: all 0.15s;
  font-weight: 500;
}
.filter-btn:hover, .filter-btn.active {
  background: var(--green);
  color: white;
  border-color: var(--green);
}

.sort-select {
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 7px;
  background: var(--white);
  font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  color: var(--ink2);
  cursor: pointer;
  outline: none;
  margin-left: auto;
}

/* ── TABLE WRAP ── */
.table-wrap {
  padding: 0 28px 40px;
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: var(--white);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: var(--shadow-md);
  min-width: 900px;
}

thead tr {
  background: var(--ink);
  color: white;
}

th {
  padding: 13px 14px;
  text-align: left;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  font-family: 'DM Mono', monospace;
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
}

th:hover { background: #2a2a2a; }

th .sort-arrow { color: rgba(255,255,255,0.3); margin-left: 4px; }
th.sorted .sort-arrow { color: #7dd4a0; }

tbody tr {
  border-bottom: 1px solid var(--border2);
  transition: background 0.12s;
  cursor: pointer;
}

tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #faf9f6; }
tbody tr.selected { background: var(--green-light); }

td {
  padding: 13px 14px;
  font-size: 13px;
  vertical-align: middle;
  color: var(--ink2);
}

td.col-name {
  font-weight: 600;
  color: var(--ink);
  min-width: 160px;
}

td.col-location {
  color: var(--ink3);
  font-size: 12px;
}

/* STATUS BADGE */
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  white-space: nowrap;
}

.status-badge::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
}

.s-review { background: var(--amber-light); color: var(--amber); }
.s-review::before { background: var(--amber); }

.s-progress { background: var(--blue-light); color: var(--blue); }
.s-progress::before { background: var(--blue); animation: pulse 1.5s infinite; }

.s-done { background: var(--green-light); color: var(--green-mid); }
.s-done::before { background: var(--green-mid); }

.s-hold { background: var(--red-light); color: var(--red); }
.s-hold::before { background: var(--red); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* TYPE BADGE */
.type-badge {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  background: var(--gray-light);
  color: var(--ink2);
  border: 1px solid var(--border);
}

/* AREA */
.area-val {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--ink);
}

/* MEMO CELL */
.memo-cell {
  max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 12px;
  color: var(--ink3);
}

/* ACTION BTNS */
.action-btns {
  display: flex;
  gap: 6px;
  opacity: 0;
  transition: opacity 0.15s;
}

tbody tr:hover .action-btns { opacity: 1; }

.btn-icon {
  width: 28px; height: 28px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--white);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  transition: all 0.15s;
}

.btn-icon:hover { background: var(--green); border-color: var(--green); }

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--ink3);
}
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-text { font-size: 14px; }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 500;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--white);
  border-radius: 14px;
  width: 100%;
  max-width: 540px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  animation: slideUp 0.2s ease;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.modal-header {
  padding: 22px 24px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-title {
  font-size: 17px;
  font-weight: 800;
}

.modal-close {
  width: 32px; height: 32px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: none;
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink3);
}
.modal-close:hover { background: var(--gray-light); }

.modal-body { padding: 20px 24px 24px; }

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 14px;
}

.form-row.full { grid-template-columns: 1fr; }

.form-group { display: flex; flex-direction: column; gap: 5px; }

.form-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--ink3);
  font-family: 'DM Mono', monospace;
}

.form-input, .form-select, .form-textarea {
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: 7px;
  font-size: 13px;
  font-family: 'Noto Sans KR', sans-serif;
  color: var(--ink);
  background: var(--white);
  outline: none;
  transition: border-color 0.2s;
}

.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--green);
}

.form-textarea { resize: vertical; min-height: 70px; }

.modal-footer {
  padding: 0 24px 22px;
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

.btn-cancel {
  padding: 9px 18px;
  border: 1px solid var(--border);
  border-radius: 7px;
  background: none;
  font-size: 13px;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  color: var(--ink2);
}
.btn-cancel:hover { background: var(--gray-light); }

.btn-save {
  padding: 9px 22px;
  border: none;
  border-radius: 7px;
  background: var(--green);
  color: white;
  font-size: 13px;
  font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
}
.btn-save:hover { background: var(--green-mid); }

/* DELETE CONFIRM */
.confirm-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 600;
  align-items: center;
  justify-content: center;
}
.confirm-overlay.open { display: flex; }
.confirm-box {
  background: white;
  border-radius: 12px;
  padding: 28px;
  max-width: 340px;
  width: 90%;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.confirm-icon { font-size: 36px; margin-bottom: 12px; }
.confirm-title { font-size: 16px; font-weight: 800; margin-bottom: 8px; }
.confirm-desc { font-size: 13px; color: var(--ink3); margin-bottom: 20px; }
.confirm-btns { display: flex; gap: 10px; justify-content: center; }
.btn-del { background: var(--red); color: white; border: none; padding: 9px 20px; border-radius: 7px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--ink);
  color: white;
  padding: 11px 22px;
  border-radius: 30px;
  font-size: 13px;
  font-weight: 500;
  z-index: 999;
  transition: transform 0.3s ease;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ACTION BUTTONS IN TOOLBAR */
.btn-action {
  padding: 7px 14px;
  border-radius: 7px;
  font-size: 12px;
  font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  border: 1px solid var(--border);
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-action:disabled { opacity: 0.38; cursor: not-allowed; }
.btn-act-add { background: var(--green); color: white; border-color: var(--green); }
.btn-act-add:hover { background: var(--green-mid); }
.btn-act-edit { background: var(--white); color: var(--ink2); }
.btn-act-edit:not(:disabled):hover { background: var(--blue-light); border-color: var(--blue); color: var(--blue); }
.btn-act-del { background: var(--white); color: var(--ink2); }
.btn-act-del:not(:disabled):hover { background: var(--red-light); border-color: var(--red); color: var(--red); }

/* RESPONSIVE */
@media (max-width: 640px) {
  .topbar { padding: 0 16px; }
  .stats-bar { padding: 12px 16px; gap: 16px; }
  .toolbar { padding: 10px 16px; }
  .table-wrap { padding: 0 16px 40px; }
  .form-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- APP CONTENT -->
<div id="appContent">

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo-mark">🏙️</div>
    <div>
      <div class="logo-text">도시계획 프로젝트 관리</div>
      <div class="logo-sub">URBAN PLANNING DASHBOARD</div>
    </div>
  </div>
  <div class="topbar-right">
  </div>
</div>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stat-item">
    <div class="stat-dot" style="background:#555"></div>
    <span class="stat-label">전체</span>
    <span class="stat-val" id="cnt-total">0</span>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-item">
    <div class="stat-dot" style="background:#b45309"></div>
    <span class="stat-label">검토중</span>
    <span class="stat-val" id="cnt-review">0</span>
  </div>
  <div class="stat-item">
    <div class="stat-dot" style="background:#1a3a6e"></div>
    <span class="stat-label">진행중</span>
    <span class="stat-val" id="cnt-progress">0</span>
  </div>
  <div class="stat-item">
    <div class="stat-dot" style="background:#2e7d52"></div>
    <span class="stat-label">완료</span>
    <span class="stat-val" id="cnt-done">0</span>
  </div>
  <div class="stat-item">
    <div class="stat-dot" style="background:#b91c1c"></div>
    <span class="stat-label">보류</span>
    <span class="stat-val" id="cnt-hold">0</span>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="사업명, 담당자 검색..." oninput="renderTable()">
  </div>
  <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">전체</button>
  <button class="filter-btn" data-filter="검토중" onclick="setFilter('검토중', this)">검토중</button>
  <button class="filter-btn" data-filter="진행중" onclick="setFilter('진행중', this)">진행중</button>
  <button class="filter-btn" data-filter="완료" onclick="setFilter('완료', this)">완료</button>
  <button class="filter-btn" data-filter="보류" onclick="setFilter('보류', this)">보류</button>
  <div style="display:flex;align-items:center;gap:8px;margin-left:auto">
    <button class="btn-action btn-act-add" onclick="openAddModal()">＋ 추가</button>
    <button class="btn-action btn-act-edit" id="btnEdit" onclick="editSelectedRow()" disabled>✏️ 수정</button>
    <button class="btn-action btn-act-del" id="btnDel" onclick="deleteSelectedRow()" disabled>🗑️ 삭제</button>
    <div style="width:1px;height:24px;background:var(--border);margin:0 4px"></div>
    <select class="sort-select" onchange="renderTable()" id="sortSelect" style="margin-left:0">
      <option value="newest">최근 추가순</option>
      <option value="name">사업명순</option>
      <option value="status">상태순</option>
    </select>
  </div>
</div>

<!-- TABLE -->
<div class="table-wrap">
  <table id="mainTable">
    <thead>
      <tr>
        <th style="width:36px"><input type="checkbox" id="checkAll" onchange="toggleAll(this)" style="cursor:pointer"></th>
        <th style="width:90px">사업번호</th>
        <th>사업명</th>
        <th>사업 유형</th>
        <th>진행 상태</th>
        <th>담당자</th>
        <th>비고</th>
        <th style="width:100px">등록일</th>
        <th style="width:80px"></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">프로젝트 추가</div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">사업명 *</label>
          <input class="form-input" id="f-name" placeholder="예: 은평구 도시개발사업">
        </div>
        <div class="form-group">
          <label class="form-label">담당자</label>
          <input class="form-input" id="f-manager" placeholder="예: 홍길동">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">사업 유형</label>
          <select class="form-select" id="f-type" onchange="toggleCustomType(this)">
            <option>도시개발사업</option>
            <option>도시정비사업</option>
            <option>재개발</option>
            <option>재건축</option>
            <option>주거환경개선</option>
            <option>지구단위계획</option>
            <option>도시계획시설</option>
            <option value="__custom__">직접 입력...</option>
          </select>
          <input class="form-input" id="f-type-custom" placeholder="사업 유형 직접 입력"
            style="display:none;margin-top:6px">
        </div>
        <div class="form-group">
          <label class="form-label">진행 상태</label>
          <select class="form-select" id="f-status">
            <option value="검토중">검토중</option>
            <option value="진행중">진행중</option>
            <option value="완료">완료</option>
            <option value="보류">보류</option>
          </select>
        </div>
      </div>
      <div class="form-row full">
        <div class="form-group">
          <label class="form-label">비고</label>
          <textarea class="form-textarea" id="f-memo" placeholder="특이사항, 참고 내용 등..."></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModalDirect()">취소</button>
      <button class="btn-save" onclick="saveProject()">저장</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon">🗑️</div>
    <div class="confirm-title">프로젝트를 삭제할까요?</div>
    <div class="confirm-desc">삭제된 데이터는 복구할 수 없습니다.</div>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeConfirm()">취소</button>
      <button class="btn-del" onclick="confirmDelete()">삭제</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script type="module">
// ── FIREBASE SETUP ──
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, query, orderBy, onSnapshot, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

// ✅ 아래 firebaseConfig 값을 본인의 Firebase 프로젝트 설정으로 교체하세요
const firebaseConfig = {

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ── DATA ──
let projects = [];
let currentFilter = 'all';
let deleteTargetId = null;

// ── 실시간 리스너 (Firestore → 화면 자동 동기화) ──
function loadData() {
  showLoadingState();
  const q = query(colRef, orderBy('createdAt', 'desc'));
  onSnapshot(q, (snapshot) => {
    projects = snapshot.docs.map(d => ({ firestoreId: d.id, ...d.data() }));
    renderTable();
  }, (err) => {
    console.error('Firestore 오류:', err);
    showToast('⚠️ 데이터 로드 실패. Firebase 설정을 확인하세요.');
  });
}

function showLoadingState() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-text">데이터를 불러오는 중...</div></div></td></tr>`;
}

async function saveData() {

  // addDoc / updateDoc 으로 개별 처리합니다
}

// ── RENDER ──
function renderTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;

  let list = projects.filter(p => {
    const matchFilter = currentFilter === 'all' || p.status === currentFilter;
    const matchSearch = !q ||
      p.name.toLowerCase().includes(q) ||
      (p.manager||'').toLowerCase().includes(q) ||
      (p.type||'').toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });

  list.sort((a, b) => {
    if (sort === 'name') return a.name.localeCompare(b.name);
    if (sort === 'area') return (b.area||0) - (a.area||0);
    if (sort === 'status') return a.status.localeCompare(b.status);
    // newest: createdAt timestamp 또는 date 문자열 기준
    const aTime = a.createdAt?.seconds || 0;
    const bTime = b.createdAt?.seconds || 0;
    return bTime - aTime;
  });

  const tbody = document.getElementById('tableBody');
  if (list.length === 0) {
    tbody.innerHTML = `<tr><td colspan="10"><div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">조건에 맞는 프로젝트가 없습니다.</div></div></td></tr>`;
    updateStats();
    return;
  }

  tbody.innerHTML = list.map((p, i) => `
    <tr data-id="${p.firestoreId}">
      <td onclick="event.stopPropagation()">
        <input type="checkbox" class="row-check" data-id="${p.firestoreId}" style="cursor:pointer">
      </td>
      <td style="font-size:12px;color:var(--ink3);font-family:'DM Mono',monospace;text-align:center">${String(i+1).padStart(3,'0')}</td>
      <td class="col-name proj-link" data-id="${p.firestoreId}" style="cursor:pointer;color:var(--green);text-decoration:underline;text-underline-offset:3px">${escHtml(p.name)}</td>
      <td><span class="type-badge">${escHtml(p.type||'-')}</span></td>
      <td>${statusBadge(p.status)}</td>
      <td>${escHtml(p.manager||'-')}</td>
      <td><div class="memo-cell" title="${escHtml(p.memo||'')}">${escHtml(p.memo||'-')}</div></td>
      <td style="font-size:12px;color:var(--ink3);font-family:'DM Mono',monospace">${p.date||'-'}</td>
      <td onclick="event.stopPropagation()">
        <div class="action-btns">
          <button class="btn-icon" title="수정" onclick="openEditModal('${p.firestoreId}')">✏️</button>
          <button class="btn-icon" title="삭제" onclick="openDeleteConfirm('${p.firestoreId}')">🗑️</button>
        </div>
      </td>
    </tr>
  `).join('');

  updateStats();

  // 프로젝트명 클릭 이벤트
  document.querySelectorAll('.proj-link').forEach(td => {
    td.addEventListener('click', function() {
      openProject(this.dataset.id);
    });
  });

  // 체크박스 변경 시 버튼 활성화
  document.querySelectorAll('.row-check').forEach(chk => {
    chk.addEventListener('change', updateActionButtons);
  });
}

function updateActionButtons() {
  const checked = document.querySelectorAll('.row-check:checked');
  const btnEdit = document.getElementById('btnEdit');
  const btnDel = document.getElementById('btnDel');
  btnEdit.disabled = checked.length !== 1;
  btnDel.disabled = checked.length === 0;
}

function editSelectedRow() {
  const checked = document.querySelectorAll('.row-check:checked');
  if (checked.length !== 1) return;
  openEditModal(checked[0].dataset.id);
}

async function deleteSelectedRow() {
  const checked = document.querySelectorAll('.row-check:checked');
  if (checked.length === 0) return;
  if (checked.length === 1) {
    // 단건 삭제는 기존 confirm 모달 사용
    openDeleteConfirm(checked[0].dataset.id);
  } else {
    // 다건 삭제
    if (!confirm(`선택한 ${checked.length}개 프로젝트를 삭제할까요?`)) return;
    try {
      await Promise.all(Array.from(checked).map(c => deleteDoc(doc(db, 'projects', c.dataset.id))));
      showToast(`🗑️ ${checked.length}개 삭제되었습니다`);
    } catch(e) {
      showToast('⚠️ 삭제 실패: ' + e.message);
    }
  }
}

function statusBadge(s) {
  const map = { '검토중': 's-review', '진행중': 's-progress', '완료': 's-done', '보류': 's-hold' };
  return `<span class="status-badge ${map[s]||''}">${s}</span>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateStats() {
  document.getElementById('cnt-total').textContent = projects.length;
  document.getElementById('cnt-review').textContent = projects.filter(p=>p.status==='검토중').length;
  document.getElementById('cnt-progress').textContent = projects.filter(p=>p.status==='진행중').length;
  document.getElementById('cnt-done').textContent = projects.filter(p=>p.status==='완료').length;
  document.getElementById('cnt-hold').textContent = projects.filter(p=>p.status==='보류').length;

}

// ── FILTER ──
function setFilter(val, btn) {
  currentFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

// ── OPEN PROJECT ──
function openProject(firestoreId) {
  const p = projects.find(x => x.firestoreId === firestoreId);
  if (!p) {
    alert('프로젝트 정보를 찾을 수 없습니다.');
    return;
  }
  try { sessionStorage.setItem('currentProject', JSON.stringify(p)); } catch(e) {}
  window.location.href = 'project.html?id=' + firestoreId;
}

function selectRow(tr) {
  tr.classList.toggle('selected');
}

function toggleAll(chk) {
  document.querySelectorAll('.row-check').forEach(c => c.checked = chk.checked);
  updateActionButtons();
}

// ── MODAL ──
function openAddModal() {
  document.getElementById('modalTitle').textContent = '프로젝트 추가';
  document.getElementById('editId').value = '';
  ['name','manager','memo'].forEach(f => document.getElementById('f-'+f).value = '');
  document.getElementById('f-type-custom').style.display = 'none';
  document.getElementById('f-type').value = '도시개발사업';
  document.getElementById('f-status').value = '검토중';
  document.getElementById('modalOverlay').classList.add('open');
}

function openEditModal(firestoreId) {
  const p = projects.find(x => x.firestoreId === firestoreId);
  if (!p) return;
  document.getElementById('modalTitle').textContent = '프로젝트 수정';
  document.getElementById('editId').value = firestoreId;
  document.getElementById('f-name').value = p.name||'';
  document.getElementById('f-manager').value = p.manager||'';
  document.getElementById('f-memo').value = p.memo||'';
  document.getElementById('f-status').value = p.status||'검토중';
  // 사업유형 - 기존 옵션에 있으면 선택, 없으면 직접입력 모드
  const typeSelect = document.getElementById('f-type');
  const typeCustom = document.getElementById('f-type-custom');
  const options = Array.from(typeSelect.options).map(o => o.value);
  if (p.type && !options.includes(p.type)) {
    typeSelect.value = '__custom__';
    typeCustom.style.display = 'block';
    typeCustom.value = p.type;
  } else {
    typeSelect.value = p.type||'도시개발사업';
    typeCustom.style.display = 'none';
    typeCustom.value = '';
  }
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
}

async function saveProject() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('⚠️ 프로젝트명을 입력해주세요'); return; }

  const editFirestoreId = document.getElementById('editId').value;
  const typeSelect = document.getElementById('f-type');
  const typeVal = typeSelect.value === '__custom__'
    ? document.getElementById('f-type-custom').value.trim()
    : typeSelect.value;
  if (!typeVal) { showToast('⚠️ 사업 유형을 입력해주세요'); return; }

  const data = {
    name,
    type: typeVal,
    status: document.getElementById('f-status').value,
    manager: document.getElementById('f-manager').value.trim(),
    memo: document.getElementById('f-memo').value.trim(),
  };

  try {
    if (editFirestoreId) {
      // 수정
      await updateDoc(doc(db, 'projects', editFirestoreId), data);
      showToast('✅ 수정되었습니다');
    } else {
      // 신규 추가
      data.date = new Date().toISOString().slice(0,10);
      data.createdAt = serverTimestamp();
      await addDoc(colRef, data);
      showToast('✅ 프로젝트가 추가되었습니다');
    }
    closeModalDirect();
  } catch(e) {
    console.error(e);
    showToast('⚠️ 저장 실패: ' + e.message);
  }
}

// ── DELETE ──
function openDeleteConfirm(firestoreId) {
  deleteTargetId = firestoreId;
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm() {
  deleteTargetId = null;
  document.getElementById('confirmOverlay').classList.remove('open');
}
async function confirmDelete() {
  try {
    await deleteDoc(doc(db, 'projects', deleteTargetId));
    closeConfirm();
    showToast('🗑️ 삭제되었습니다');
  } catch(e) {
    showToast('⚠️ 삭제 실패: ' + e.message);
  }
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── INIT ──
loadData();

window.toggleCustomType = function(sel) {
  const custom = document.getElementById('f-type-custom');
  if (sel.value === '__custom__') {
    custom.style.display = 'block';
    custom.focus();
  } else {
    custom.style.display = 'none';
    custom.value = '';
  }
};

window.openEditModal = openEditModal;
window.openDeleteConfirm = openDeleteConfirm;
window.closeModalDirect = closeModalDirect;
window.closeModal = closeModal;
window.saveProject = saveProject;
window.confirmDelete = confirmDelete;
window.closeConfirm = closeConfirm;
window.setFilter = setFilter;
window.toggleAll = toggleAll;
window.editSelectedRow = editSelectedRow;
window.deleteSelectedRow = deleteSelectedRow;
window.renderTable = renderTable;
</script>
