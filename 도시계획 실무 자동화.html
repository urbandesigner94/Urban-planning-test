<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>도시계획 프로젝트 관리</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #21253a;
    --border: #2d3250;
    --accent: #4f6ef7;
    --accent2: #7c3aed;
    --text: #e8eaf6;
    --text-muted: #7b7f9e;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --info: #3b82f6;
    --hold: #6b7280;
    --radius: 12px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #1a1d27 0%, #12152a 100%);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-icon {
    font-size: 28px;
    line-height: 1;
  }

  .header-title-group h1 {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .header-title-group span {
    font-size: 10px;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 2px;
    display: block;
    margin-top: 1px;
  }

  .btn-add {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 9px 18px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.2s, transform 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-add:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-add:active { transform: translateY(0); }

  /* MAIN */
  main { max-width: 1400px; margin: 0 auto; padding: 28px 32px; }

  /* STAT CARDS */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--card-accent, var(--accent));
    opacity: 0.6;
    transition: opacity 0.2s;
  }

  .stat-card:hover, .stat-card.active {
    border-color: var(--card-accent, var(--accent));
    background: var(--surface2);
    transform: translateY(-2px);
  }

  .stat-card:hover::before, .stat-card.active::before { opacity: 1; }

  .stat-card[data-filter="all"] { --card-accent: var(--accent); }
  .stat-card[data-filter="검토중"] { --card-accent: var(--warning); }
  .stat-card[data-filter="진행중"] { --card-accent: var(--success); }
  .stat-card[data-filter="완료"] { --card-accent: var(--info); }
  .stat-card[data-filter="보류"] { --card-accent: var(--hold); }
  .stat-card[data-filter="area"] { --card-accent: #a855f7; cursor: default; }
  .stat-card[data-filter="area"]:hover { transform: none; }

  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
    margin-bottom: 8px;
    letter-spacing: 0.3px;
  }

  .stat-value {
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .stat-unit {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    gap: 12px;
  }

  .search-box {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    gap: 8px;
    flex: 1;
    max-width: 320px;
    transition: border-color 0.2s;
  }

  .search-box:focus-within { border-color: var(--accent); }

  .search-box input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    width: 100%;
  }

  .search-box input::placeholder { color: var(--text-muted); }

  .filter-tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
  }

  .filter-tab {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: inherit;
    transition: all 0.15s;
  }

  .filter-tab:hover { color: var(--text); }
  .filter-tab.active { background: var(--accent); color: #fff; }

  .sort-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .sort-select:focus { border-color: var(--accent); }

  /* TABLE */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    background: #12152a;
    padding: 12px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  td {
    padding: 13px 16px;
    font-size: 13px;
    vertical-align: middle;
  }

  .td-num { color: var(--text-muted); font-size: 12px; width: 40px; }
  .td-name { font-weight: 600; color: var(--text); }
  .td-location { color: var(--text-muted); }
  .td-type {
    background: rgba(79, 110, 247, 0.12);
    color: var(--accent);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 11px;
    font-weight: 500;
    display: inline-block;
    white-space: nowrap;
  }

  .td-area { font-weight: 500; font-variant-numeric: tabular-nums; }
  .td-memo { color: var(--text-muted); max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .td-date { color: var(--text-muted); font-size: 12px; white-space: nowrap; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }

  .badge::before {
    content: '';
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  .badge-검토중 { background: rgba(245,158,11,0.15); color: var(--warning); }
  .badge-진행중 { background: rgba(16,185,129,0.15); color: var(--success); }
  .badge-완료 { background: rgba(59,130,246,0.15); color: var(--info); }
  .badge-보류 { background: rgba(107,114,128,0.15); color: var(--hold); }

  .btn-delete {
    background: none;
    border: 1px solid transparent;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 6px;
    padding: 5px 8px;
    font-size: 14px;
    transition: all 0.15s;
    font-family: inherit;
  }

  .btn-delete:hover { border-color: var(--danger); color: var(--danger); background: rgba(239,68,68,0.1); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    backdrop-filter: blur(4px);
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 520px;
    padding: 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    animation: slideUp 0.2s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
  }

  .modal-header h2 { font-size: 16px; font-weight: 700; }

  .btn-close {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 18px;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.15s;
  }

  .btn-close:hover { color: var(--text); }

  .form-grid {
    display: grid;
    gap: 16px;
  }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .form-group { display: flex; flex-direction: column; gap: 6px; }

  .form-group label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.3px;
  }

  .form-group label .req { color: var(--accent); margin-left: 2px; }

  .form-control {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .form-control:focus { border-color: var(--accent); }
  .form-control option { background: var(--surface2); }

  textarea.form-control { resize: vertical; min-height: 72px; }

  .modal-footer {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 22px;
  }

  .btn { padding: 9px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; border: none; }
  .btn-cancel { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
  .btn-cancel:hover { color: var(--text); }
  .btn-save { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
  .btn-save:hover { opacity: 0.9; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { opacity: 0.9; }

  /* DELETE MODAL */
  .delete-modal { max-width: 380px; text-align: center; }
  .delete-modal .icon { font-size: 36px; margin-bottom: 12px; }
  .delete-modal h2 { font-size: 16px; margin-bottom: 8px; }
  .delete-modal p { color: var(--text-muted); font-size: 13px; margin-bottom: 22px; }
  .delete-modal .modal-footer { justify-content: center; }

  @media (max-width: 900px) {
    .stats-grid { grid-template-columns: repeat(3, 1fr); }
    main { padding: 20px 16px; }
    header { padding: 0 16px; }
  }

  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .form-row { grid-template-columns: 1fr; }
    .toolbar { flex-wrap: wrap; }
    .filter-tabs { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="header-icon">🏙️</span>
    <div class="header-title-group">
      <h1>도시계획 프로젝트 관리</h1>
      <span>URBAN PLANNING DASHBOARD</span>
    </div>
  </div>
  <button class="btn-add" onclick="openAddModal()">＋ 프로젝트 추가</button>
</header>

<main>
  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card active" data-filter="all" onclick="setFilter('all', this)">
      <div class="stat-label">전체</div>
      <div class="stat-value" id="cnt-all">0</div>
    </div>
    <div class="stat-card" data-filter="검토중" onclick="setFilter('검토중', this)">
      <div class="stat-label">검토중</div>
      <div class="stat-value" id="cnt-검토중">0</div>
    </div>
    <div class="stat-card" data-filter="진행중" onclick="setFilter('진행중', this)">
      <div class="stat-label">진행중</div>
      <div class="stat-value" id="cnt-진행중">0</div>
    </div>
    <div class="stat-card" data-filter="완료" onclick="setFilter('완료', this)">
      <div class="stat-label">완료</div>
      <div class="stat-value" id="cnt-완료">0</div>
    </div>
    <div class="stat-card" data-filter="보류" onclick="setFilter('보류', this)">
      <div class="stat-label">보류</div>
      <div class="stat-value" id="cnt-보류">0</div>
    </div>
    <div class="stat-card" data-filter="area">
      <div class="stat-label">총 면적</div>
      <div class="stat-value" id="cnt-area">0</div>
      <div class="stat-unit">㎡</div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="search-input" placeholder="프로젝트명, 위치, 담당자 검색..." oninput="renderTable()">
    </div>
    <div class="filter-tabs">
      <button class="filter-tab active" data-tab="all" onclick="setTabFilter('all', this)">전체</button>
      <button class="filter-tab" data-tab="검토중" onclick="setTabFilter('검토중', this)">검토중</button>
      <button class="filter-tab" data-tab="진행중" onclick="setTabFilter('진행중', this)">진행중</button>
      <button class="filter-tab" data-tab="완료" onclick="setTabFilter('완료', this)">완료</button>
      <button class="filter-tab" data-tab="보류" onclick="setTabFilter('보류', this)">보류</button>
    </div>
    <select class="sort-select" id="sort-select" onchange="renderTable()">
      <option value="recent">최근 추가순</option>
      <option value="name">프로젝트명순</option>
      <option value="area">면적 큰 순</option>
      <option value="status">상태순</option>
    </select>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th></th>
          <th>프로젝트명</th>
          <th>위치</th>
          <th>사업 유형</th>
          <th>진행 상태</th>
          <th>담당자</th>
          <th>면적 (㎡)</th>
          <th>메모/비고</th>
          <th>등록일</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</main>

<!-- ADD MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-header">
      <h2>프로젝트 추가</h2>
      <button class="btn-close" onclick="closeAddModal()">✕</button>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label>프로젝트명 <span class="req">*</span></label>
        <input class="form-control" id="f-name" type="text" placeholder="프로젝트명을 입력하세요">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>위치</label>
          <input class="form-control" id="f-location" type="text" placeholder="위치를 입력하세요">
        </div>
        <div class="form-group">
          <label>담당자</label>
          <input class="form-control" id="f-manager" type="text" placeholder="담당자명">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>사업 유형</label>
          <select class="form-control" id="f-type">
            <option value="">선택</option>
            <option>도시개발사업</option>
            <option>도시정비사업</option>
            <option>재개발</option>
            <option>재건축</option>
            <option>주거환경개선</option>
            <option>지구단위계획</option>
            <option>도시계획시설</option>
            <option>기타</option>
          </select>
        </div>
        <div class="form-group">
          <label>진행 상태</label>
          <select class="form-control" id="f-status">
            <option value="검토중">검토중</option>
            <option value="진행중">진행중</option>
            <option value="완료">완료</option>
            <option value="보류">보류</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>면적 (㎡)</label>
        <input class="form-control" id="f-area" type="number" placeholder="면적을 입력하세요" min="0">
      </div>
      <div class="form-group">
        <label>메모/비고</label>
        <textarea class="form-control" id="f-memo" placeholder="메모나 비고 사항을 입력하세요"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeAddModal()">취소</button>
      <button class="btn btn-save" onclick="saveProject()">저장</button>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal delete-modal">
    <div class="icon">🗑️</div>
    <h2>프로젝트를 삭제할까요?</h2>
    <p>삭제된 데이터는 복구할 수 없습니다.</p>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeDeleteModal()">취소</button>
      <button class="btn btn-danger" onclick="confirmDelete()">삭제</button>
    </div>
  </div>
</div>

<script>
  let projects = JSON.parse(localStorage.getItem('urban_projects') || '[]');
  let currentFilter = 'all';
  let deleteTargetId = null;

  function save() {
    localStorage.setItem('urban_projects', JSON.stringify(projects));
  }

  function updateStats() {
    const statuses = ['검토중', '진행중', '완료', '보류'];
    document.getElementById('cnt-all').textContent = projects.length;
    statuses.forEach(s => {
      document.getElementById('cnt-' + s).textContent = projects.filter(p => p.status === s).length;
    });
    const totalArea = projects.reduce((sum, p) => sum + (Number(p.area) || 0), 0);
    document.getElementById('cnt-area').textContent = totalArea.toLocaleString();
  }

  function getFiltered() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const sort = document.getElementById('sort-select').value;
    let list = projects.filter(p => {
      const matchFilter = currentFilter === 'all' || p.status === currentFilter;
      const matchSearch = !q || p.name.toLowerCase().includes(q) ||
        (p.location || '').toLowerCase().includes(q) ||
        (p.manager || '').toLowerCase().includes(q);
      return matchFilter && matchSearch;
    });

    const statusOrder = { '검토중': 0, '진행중': 1, '완료': 2, '보류': 3 };
    if (sort === 'name') list.sort((a, b) => a.name.localeCompare(b.name, 'ko'));
    else if (sort === 'area') list.sort((a, b) => (Number(b.area) || 0) - (Number(a.area) || 0));
    else if (sort === 'status') list.sort((a, b) => (statusOrder[a.status] ?? 9) - (statusOrder[b.status] ?? 9));
    else list.sort((a, b) => b.id - a.id);

    return list;
  }

  function renderTable() {
    updateStats();
    const list = getFiltered();
    const tbody = document.getElementById('table-body');

    if (list.length === 0) {
      tbody.innerHTML = `<tr><td colspan="10"><div class="empty-state"><div class="icon">📋</div><p>등록된 프로젝트가 없습니다.</p></div></td></tr>`;
      return;
    }

    tbody.innerHTML = list.map((p, i) => `
      <tr>
        <td class="td-num">${i + 1}</td>
        <td class="td-name">${esc(p.name)}</td>
        <td class="td-location">${esc(p.location || '-')}</td>
        <td><span class="td-type">${esc(p.type || '-')}</span></td>
        <td><span class="badge badge-${p.status}">${esc(p.status)}</span></td>
        <td>${esc(p.manager || '-')}</td>
        <td class="td-area">${p.area ? Number(p.area).toLocaleString() : '-'}</td>
        <td class="td-memo" title="${esc(p.memo || '')}">${esc(p.memo || '-')}</td>
        <td class="td-date">${p.date}</td>
        <td><button class="btn-delete" onclick="openDeleteModal(${p.id})">🗑️</button></td>
      </tr>
    `).join('');
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));
    if (el) el.classList.add('active');
    document.querySelectorAll('.filter-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.tab === f);
    });
    renderTable();
  }

  function setTabFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.querySelectorAll('.stat-card').forEach(c => {
      c.classList.toggle('active', c.dataset.filter === f);
    });
    renderTable();
  }

  function openAddModal() {
    ['f-name','f-location','f-manager','f-area','f-memo'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-type').value = '';
    document.getElementById('f-status').value = '검토중';
    document.getElementById('add-modal').classList.add('open');
    document.getElementById('f-name').focus();
  }

  function closeAddModal() {
    document.getElementById('add-modal').classList.remove('open');
  }

  function saveProject() {
    const name = document.getElementById('f-name').value.trim();
    if (!name) { alert('프로젝트명을 입력해주세요.'); document.getElementById('f-name').focus(); return; }
    const today = new Date();
    const date = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
    projects.push({
      id: Date.now(),
      name,
      location: document.getElementById('f-location').value.trim(),
      type: document.getElementById('f-type').value,
      status: document.getElementById('f-status').value,
      manager: document.getElementById('f-manager').value.trim(),
      area: document.getElementById('f-area').value,
      memo: document.getElementById('f-memo').value.trim(),
      date
    });
    save();
    closeAddModal();
    renderTable();
  }

  function openDeleteModal(id) {
    deleteTargetId = id;
    document.getElementById('delete-modal').classList.add('open');
  }

  function closeDeleteModal() {
    deleteTargetId = null;
    document.getElementById('delete-modal').classList.remove('open');
  }

  function confirmDelete() {
    projects = projects.filter(p => p.id !== deleteTargetId);
    save();
    closeDeleteModal();
    renderTable();
  }

  // Close modals on overlay click
  document.getElementById('add-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeAddModal(); });
  document.getElementById('delete-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeDeleteModal(); });

  // Init
  renderTable();
</script>
</body>
</html>
